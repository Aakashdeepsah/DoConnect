<nav class="navbar">
  <div class="nav-inner">

    <!-- Brand -->
    <a routerLink="/" class="brand">
      <span class="brand-icon">⚡</span>
      <span class="brand-text">DoConnect</span>
    </a>

    <!-- Search (center) -->
    <div class="nav-search">
      <input
        type="text"
        placeholder="Search questions..."
        [(ngModel)]="searchQuery"
        (keyup.enter)="onSearch()"
        class="search-input"
      />
      <button class="search-btn" (click)="onSearch()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
      </button>
    </div>

    <!-- Right actions -->
    <div class="nav-actions">

      <!-- Guest -->
      <ng-container *ngIf="!isLoggedIn">
        <a routerLink="/login"    class="nav-link">Login</a>
        <a routerLink="/register" class="btn btn-primary btn-sm">Get Started</a>
      </ng-container>

      <!-- Logged-in User -->
      <ng-container *ngIf="isLoggedIn && !isAdmin">
        <a routerLink="/home" class="nav-link" routerLinkActive="active">Questions</a>
        <a routerLink="/ask"  class="btn btn-primary btn-sm">+ Ask</a>
        <div class="user-chip">
          <span class="user-avatar">{{ username.charAt(0).toUpperCase() }}</span>
          <span class="user-name">{{ username }}</span>
        </div>
        <button class="btn btn-ghost btn-sm" (click)="logout()">Logout</button>
      </ng-container>

      <!-- Admin -->
      <ng-container *ngIf="isLoggedIn && isAdmin">
        <a routerLink="/home"  class="nav-link" routerLinkActive="active">Browse</a>
        <a routerLink="/admin" class="nav-admin-btn" routerLinkActive="active">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
          </svg>
          Admin Panel
          <span class="admin-badge" *ngIf="pendingCount > 0">{{ pendingCount }}</span>
        </a>
        <div class="user-chip admin-chip">
          <span class="user-avatar admin-avatar">{{ username.charAt(0).toUpperCase() }}</span>
          <span class="user-name">{{ username }}</span>
        </div>
        <button class="btn btn-ghost btn-sm" (click)="logout()">Logout</button>
      </ng-container>
    </div>

  </div>
</nav>
