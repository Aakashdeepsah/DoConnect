<div class="auth-wrapper">
  <div class="auth-card card">
    <div class="auth-header">
      <a routerLink="/" class="back-link">← Back</a>
      <div class="auth-logo">⚡</div>
      <h2>Welcome back</h2>
      <p>Sign in to your DoConnect account</p>
    </div>
    <div class="alert alert-error" *ngIf="errorMessage">{{ errorMessage }}</div>
    <form (ngSubmit)="onLogin()" #f="ngForm" novalidate>
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" name="email" [(ngModel)]="email"
          placeholder="you@example.com" required #ef="ngModel"/>
        <span class="field-error" *ngIf="ef.invalid && ef.touched">Please enter a valid email.</span>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" [(ngModel)]="password"
          placeholder="••••••••" required minlength="6" #pf="ngModel"/>
        <span class="field-error" *ngIf="pf.invalid && pf.touched">Password must be at least 6 characters.</span>
      </div>
      <button type="submit" class="btn btn-primary full-width" [disabled]="isLoading || f.invalid">
        <span class="spinner" *ngIf="isLoading"></span>
        {{ isLoading ? 'Signing in...' : 'Sign In' }}
      </button>
    </form>
    <p class="auth-footer">Don't have an account? <a routerLink="/register">Create one</a></p>
  </div>
</div>
